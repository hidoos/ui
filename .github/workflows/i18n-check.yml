name: I18n Translation Check

on:
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - '**.ts'
      - '**.tsx'
      - '.i18n-tracker.lock'
      - 'src/locales/**'

jobs:
  i18n-check:
    name: Check I18n Translations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for unprocessed i18n files
        id: i18n-check
        run: |
          echo "Running i18n tracker scan..."
          OUTPUT=$(node tools/i18n-tracker.cjs)
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "All files are up to date"; then
            echo "✅ All files have been processed for i18n"
            echo "status=success" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "❌ Found files requiring i18n processing"
            echo "status=failure" >> $GITHUB_OUTPUT
            echo ""
            echo "::error::The following files need i18n translation processing:"
            echo "$OUTPUT" | grep -A 1000 "Files requiring i18n processing:" | tail -n +2
            echo ""
            echo "Please run the following command to update the i18n tracker after adding translations:"
            echo "  node tools/i18n-tracker.cjs update <file-path>"
            exit 1
          fi
